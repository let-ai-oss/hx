name: Release

on:
  push:
    branches: ["main"]
    paths:
      - "src/**"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/release.yml"
  workflow_dispatch:

concurrency:
  group: hx-release
  cancel-in-progress: false

jobs:
  release:
    name: Cross-compile and publish hx
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      # hx has zero production dependencies; install is only for devDeps and is
      # harmless. Keep it for parity + lockfile validation.
      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Read hx version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          version="$(bun -e 'import pkg from "./package.json"; console.log(pkg.version)')"
          if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "package.json version must be a stable semver: $version" >&2
            exit 1
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Compile darwin/linux binaries
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          printf '%s\n' "${{ steps.version.outputs.value }}" > dist/hx-version

          for target in bun-darwin-arm64 bun-darwin-x64 bun-linux-arm64 bun-linux-x64; do
            out_name="hx-${target#bun-}"
            out_path="dist/${out_name}"
            build_target="$target"
            case "$target" in
              *-x64) build_target="${target}-baseline" ;;
            esac
            echo "::group::Build $out_name ($build_target)"
            bun build \
              --compile \
              --minify \
              --target="$build_target" \
              ./src/cli.ts \
              --outfile "$out_path"
            sha256sum "$out_path" | awk -v name="$out_name" '{print $1"  "name}' \
              > "${out_path}.sha256"
            gzip -9 -f "$out_path"
            ls -la "${out_path}.gz" "${out_path}.sha256"
            echo "::endgroup::"
          done

      - name: Publish rolling release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.value }}"
          tag="builds/hx-${version}"

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release delete "$tag" --yes
          fi
          git tag -f "$tag" "$GITHUB_SHA"
          git push origin --force "refs/tags/$tag"

          gh release create "$tag" dist/hx-* \
            --title "hx build v$version" \
            --notes "Build from ${GITHUB_SHA:0:8} (hx v$version)." \
            --prerelease=false \
            --latest=false

      - name: Publish immutable release
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.value }}"
          tag="releases/hx-${version}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "release $tag already exists; skipping immutable release"
            exit 0
          fi
          gh release create "$tag" dist/hx-* \
            --title "hx v$version" \
            --notes "Published from ${GITHUB_SHA:0:8}." \
            --target "$GITHUB_SHA" \
            --latest=false
