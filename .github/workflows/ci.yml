name: CI

on:
  pull_request:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  checks:
    name: Typecheck, lint, and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # ui/ is its own package: install pinned deps, build (which typechecks it
      # via `tsc -b`), then generate the embed manifest so the root typecheck
      # below also covers src/ui-assets.gen.ts exactly as a release build sees it.
      - name: Build web UI
        run: |
          cd ui
          bun install --frozen-lockfile
          bun run build
          cd ..
          bun run gen:ui

      - name: Typecheck
        run: bun run typecheck

      # Blocking lint = style + security rules (eslint-plugin-security).
      # See eslint.config.js and the OSS Readiness Plan, Part 4.3.
      - name: Lint (incl. security rules)
        run: bun run lint

      - name: Test
        run: bun test
